name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # The HF_TOKEN is used for authentication
          # Replace 'akashh0210' with your actual HF username if different
          # Replace 'mutual-funds-api' with your actual Space name if different
          git push --force https://akashh0210:$HF_TOKEN@huggingface.co/spaces/akashh0210/mutual-funds-api main
