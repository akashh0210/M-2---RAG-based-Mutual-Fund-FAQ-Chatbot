name: Daily RAG Ingestion

on:
  schedule:
    # 09:15 AM IST is 03:45 AM UTC
    - cron: '45 3 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

     - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Manually install the updated alsa library for Ubuntu 24.04 compatibility
          sudo apt-get update
          sudo apt-get install -y libasound2t64
          # Install playwright browsers
          npx playwright install chromium

      - name: Run Ingestion Pipeline
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          # If using OpenAI for other logic (Phase 4), add it here
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # The orchestrator runs Scrape -> Fact Extract -> Chunk -> Embed -> Cloud
          python -m pipeline.run_pipeline

      - name: Upload Logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs
          path: logs/
