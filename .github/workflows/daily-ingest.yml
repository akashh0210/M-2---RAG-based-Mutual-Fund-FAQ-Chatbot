name: Daily RAG Ingestion

on:
  schedule:
    # 09:15 AM IST is 03:45 AM UTC
    - cron: '45 3 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HEADLESS: 'true'

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System dependencies ───────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64

      # ── 3. Python setup ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 4. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          npx playwright install chromium --with-deps

      # ── 5. Run full ingestion pipeline ───────────────────────────────────
      # The orchestrator runs: Scrape -> Fact Extract -> Chunk -> Embed -> Finalize
      - name: Run Ingestion Pipeline
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INGEST_RUN_ID: ${{ github.run_id }}
        run: |
          python -m pipeline.run_pipeline

      # ── 6. Upload pipeline logs ──────────────────────────────────────────
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: |
            data/logs/
            logs/
          retention-days: 30

      # ── 7. Failure notification ──────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily RAG Ingestion FAILED at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "::error::Check pipeline-logs artifact or scraping_logs table for details"
