name: Daily RAG Ingestion

on:
  schedule:
    # 09:15 AM IST is 03:45 AM UTC
    - cron: '45 3 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HEADLESS: 'true'

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. System dependencies ───────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64

      # ── 3. Python setup ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 4. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          npx playwright install chromium --with-deps

      # ── 4b. Verify key dependency versions ────────────────────────────────
      - name: Verify installed package versions
        run: |
          python -c "import chromadb, sys; print(f'::notice::chromadb version: {chromadb.__version__}')"

      # ── 5. Pre-flight: Verify secrets are loaded ──────────────────────────
      - name: Verify secrets (pre-flight check)
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "
          import os, sys
          secrets = {
              'CHROMA_API_KEY': os.getenv('CHROMA_API_KEY', ''),
              'CHROMA_TENANT': os.getenv('CHROMA_TENANT', ''),
              'CHROMA_DATABASE': os.getenv('CHROMA_DATABASE', ''),
              'GROQ_API_KEY': os.getenv('GROQ_API_KEY', ''),
          }
          all_ok = True
          for name, val in secrets.items():
              stripped = val.strip()
              status = f'OK (len={len(stripped)})'
              if not stripped:
                  status = 'MISSING OR EMPTY'
                  all_ok = False
              elif stripped != val:
                  status = f'HAS WHITESPACE (raw={len(val)}, stripped={len(stripped)})'
              print(f'  {name}: {status}')
          if not all_ok:
              print('::error::One or more secrets are missing. Check Settings > Secrets.')
              sys.exit(1)
          print('All secrets verified.')
          "

      # ── 6. Pre-flight: Chroma Cloud heartbeat ────────────────────────────
      - name: Test Chroma Cloud connection
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
        run: |
          python -c "
          import os, chromadb, sys

          tenant = os.getenv('CHROMA_TENANT', '').strip()
          database = os.getenv('CHROMA_DATABASE', '').strip()
          api_key = os.getenv('CHROMA_API_KEY', '').strip()
          print(f'::notice::Connecting: tenant={tenant[:8]}..., db={database}')
          print(f'::notice::chromadb client version: {chromadb.__version__}')
          try:
              client = chromadb.CloudClient(tenant=tenant, database=database, api_key=api_key)
              print(f'Heartbeat: {client.heartbeat()}')
              coll = client.get_or_create_collection('sbi_mf_knowledge')
              print(f'Collection OK: {coll.name} (count={coll.count()})')
              print('Chroma Cloud connection OK')
          except Exception as e:
              print(f'::error::Chroma connection failed: {e}')
              sys.exit(1)
          "

      # ── 7. Run full ingestion pipeline ───────────────────────────────────
      # The orchestrator runs: Scrape -> Fact Extract -> Chunk -> Embed -> Finalize
      - name: Run Ingestion Pipeline
        env:
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_TENANT: ${{ secrets.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ secrets.CHROMA_DATABASE }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INGEST_RUN_ID: ${{ github.run_id }}
        run: |
          python -m pipeline.run_pipeline

      # ── 6. Upload pipeline logs ──────────────────────────────────────────
      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: |
            data/logs/
            logs/
          retention-days: 30

      # ── 7. Failure notification ──────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Daily RAG Ingestion FAILED at $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "::error::Check pipeline-logs artifact or scraping_logs table for details"
