services:
  - type: web
    name: mutual-funds-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RAG_DATABASE_PATH
        value: /var/lib/data/rag.db
      - key: GROQ_API_KEY
        sync: false
      - key: CHROMA_TENANT
        sync: false
      - key: CHROMA_DATABASE
        sync: false
      - key: CHROMA_API_KEY
        sync: false
    disk:
      name: rag-storage
      mountPath: /var/lib/data
      sizeGB: 1
